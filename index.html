<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="InTheCity">
    <title>In The City - Walking Game</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="assets/icons/icon-512.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <div class="game-title">In The City</div>
            <div class="hud-chip">Coins: <span id="coinsCount">0/0</span></div>
            <div class="hud-chip">Hits: <span id="hitsCount">0</span></div>
            <div class="hud-chip">Position: <span id="position">X: 0, Y: 0</span></div>
            <div class="hud-chip">Status: <span id="statusLabel">Ready</span></div>
            <button id="pauseBtn" class="pause-control" type="button">PAUSE</button>
        </div>

        <div class="start-screen active" id="startScreen">
            <div class="start-card">
                <h2>Urban Rush</h2>
                <p>Mouse/touch moves player | arrows and WASD also work.</p>
                <p>Press P or use PAUSE button to pause/resume.</p>
                <p>Collect every coin and avoid fire flowers.</p>
                <button id="startBtn" type="button">Start Walk</button>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div class="city-strip" id="cityStrip" aria-label="City moments">
            <div class="city-slide active city-a" style="--slide-img: url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?auto=format&fit=crop&w=1600&q=80');"></div>
            <div class="city-slide city-b" style="--slide-img: url('https://images.unsplash.com/photo-1494526585095-c41746248156?auto=format&fit=crop&w=1600&q=80');"></div>
            <div class="city-slide city-c" style="--slide-img: url('https://images.unsplash.com/photo-1519501025264-65ba15a82390?auto=format&fit=crop&w=1600&q=80');"></div>
            <div class="city-slide city-d" style="--slide-img: url('https://images.unsplash.com/photo-1480714378408-67cf0d13bc1f?auto=format&fit=crop&w=1600&q=80');"></div>
            <div class="city-strip-badge">Neon District | Every 6s</div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
